[build]
  command = "npm run build"
  publish = "_site"

[[redirects]]
  from = "/"
  to = "/llms.txt"
  status = 200
  force = true
  query = { Accept = "text/markdown" }

[[redirects]]
  from = "/en/"
  to = "/llms.txt"
  status = 200
  force = true
  query = { Accept = "text/markdown" }

[[redirects]]
  from = "/pt/"
  to = "/llms.txt"
  status = 200
  force = true
  query = { Accept = "text/markdown" }

[[redirects]]
  from = "/"
  to = "/pt/"
  status = 302
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}

# 2. Default English Redirect
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# =========================================================
# PHASE 3: GLOBAL CATCH-ALLS & ERROR HANDLING
# =========================================================
# Custom 404 Page (Serves 404.html without mutating the browser URL)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404