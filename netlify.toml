[build]
  command = "npm run build"
  publish = "_site"

# =========================================================
# STANDARD HUMAN VISITOR LANGUAGE ROUTING
# =========================================================
# 1. Portuguese Language Redirect
[[redirects]]
  from = "/"
  to = "/pt/"
  status = 302
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}

# 2. Default English Redirect
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# =========================================================
# GLOBAL CATCH-ALLS & ERROR HANDLING
# =========================================================
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  
  # =========================================================
  # EDGE FUNCTIONS SPECIFICATION
  # =========================================================
  [[edge_functions]]
    path = "/"
    function = "markdown-negotiation"
  
  [[edge_functions]]
    path = "/en/"
    function = "markdown-negotiation"
  
  [[edge_functions]]
    path = "/pt/"
    function = "markdown-negotiation"

# =========================================================
# STRICT CACHE-CONTROL HEADERS FOR PERFORMANCE
# =========================================================
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon-96x96.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"