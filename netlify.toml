[build]
  command = "npm run build"
  publish = "_site"

# =========================================================
# STANDARD HUMAN VISITOR LANGUAGE ROUTING
# =========================================================
# 1. Portuguese Language Redirect
[[redirects]]
  from = "/"
  to = "/pt/"
  status = 302
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}

# 2. Default English Redirect
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# =========================================================
# LEGAL / PRIVACY / TERMS DEEP-LINKS
# These have no standalone page: the content lives in the
# legal overlay on the single-page site. Each alias 301s to
# the localized home with ?legal, and client JS opens the
# overlay on load (see partials/legal-overlay.njk).
# =========================================================
# Language-prefixed aliases (EN)
[[redirects]]
  from = "/en/privacy"
  to = "/en/?legal"
  status = 301
[[redirects]]
  from = "/en/terms"
  to = "/en/?legal"
  status = 301
[[redirects]]
  from = "/en/cookies"
  to = "/en/?legal"
  status = 301

# Language-prefixed aliases (PT)
[[redirects]]
  from = "/pt/privacidade"
  to = "/pt/?legal"
  status = 301
[[redirects]]
  from = "/pt/termos"
  to = "/pt/?legal"
  status = 301
[[redirects]]
  from = "/pt/cookies"
  to = "/pt/?legal"
  status = 301

# Bare shortcuts — language-detected (PT speakers first, EN fallback)
[[redirects]]
  from = "/privacy"
  to = "/pt/?legal"
  status = 301
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}
[[redirects]]
  from = "/privacy"
  to = "/en/?legal"
  status = 301
[[redirects]]
  from = "/terms"
  to = "/pt/?legal"
  status = 301
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}
[[redirects]]
  from = "/terms"
  to = "/en/?legal"
  status = 301
[[redirects]]
  from = "/cookies"
  to = "/pt/?legal"
  status = 301
  conditions = {Language = ["pt", "pt-BR", "pt-PT"]}
[[redirects]]
  from = "/cookies"
  to = "/en/?legal"
  status = 301

# =========================================================
# GLOBAL CATCH-ALLS & ERROR HANDLING
# =========================================================
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  
  # =========================================================
  # EDGE FUNCTIONS SPECIFICATION
  # =========================================================
  [[edge_functions]]
    path = "/"
    function = "markdown-negotiation"
  
  [[edge_functions]]
    path = "/en/"
    function = "markdown-negotiation"
  
  [[edge_functions]]
    path = "/pt/"
    function = "markdown-negotiation"

# =========================================================
# STRICT CACHE-CONTROL HEADERS FOR PERFORMANCE
# =========================================================
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon-96x96.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"